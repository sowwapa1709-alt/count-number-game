<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Number Guesser</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0d0d1a;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        .game-card {
            background: #14142b;
            border: 2px solid #00f2fe;
            box-shadow: 0 0 30px rgba(0, 242, 254, 0.2);
            border-radius: 15px;
            padding: 30px;
            width: 100%;
            max-width: 450px;
            text-align: center;
            position: relative;
        }
        h1 {
            font-size: 32px;
            color: #00f2fe;
            text-shadow: 0 0 15px #00f2fe;
            margin-bottom: 10px;
        }
        p.subtitle {
            color: #aaa;
            font-size: 14px;
            margin-bottom: 25px;
        }
        .stats-container {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-family: monospace;
            font-size: 16px;
        }
        #timerBox { color: #39ff14; text-shadow: 0 0 8px #39ff14; }
        #attemptsBox { color: #ff007f; text-shadow: 0 0 8px #ff007f; }

        .input-group {
            margin-bottom: 20px;
        }
        input[type="number"] {
            width: 100%;
            padding: 15px;
            background: #0d0d1a;
            border: 2px solid #333;
            border-radius: 8px;
            color: #fff;
            font-size: 24px;
            text-align: center;
            outline: none;
            transition: all 0.3s;
        }
        input[type="number"]:focus {
            border-color: #00f2fe;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.4);
        }
        /* ซ่อนลูกศรของ input number */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        button {
            width: 100%;
            padding: 15px;
            background: transparent;
            color: #00f2fe;
            border: 2px solid #00f2fe;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.1);
        }
        button:hover {
            background: #00f2fe;
            color: #14142b;
            box-shadow: 0 0 20px #00f2fe;
        }

        .hint-message {
            margin-top: 25px;
            font-size: 20px;
            font-weight: bold;
            min-height: 30px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
            transition: all 0.3s;
        }

        .success { color: #39ff14; text-shadow: 0 0 15px #39ff14; }
        .too-high { color: #ff007f; text-shadow: 0 0 15px #ff007f; }
        .too-low { color: #fffb00; text-shadow: 0 0 15px #fffb00; }

        #btnReset {
            margin-top: 15px;
            border-color: #ff007f;
            color: #ff007f;
            display: none;
        }
        #btnReset:hover {
            background: #ff007f;
            color: #14142b;
            box-shadow: 0 0 20px #ff007f;
        }
    </style>
</head>
<body>

<div class="game-card">
    <h1>NUMBER GUESSER</h1>
    <p class="subtitle">ระบบได้สุ่มตัวเลขลึกลับระหว่าง 1 ถึง 100 ไว้แล้ว!</p>

    <div class="stats-container">
        <div id="timerBox">TIME: <span id="timeVal">0.0</span>s</div>
        <div id="attemptsBox">GUESS: <span id="attemptVal">0</span></div>
    </div>

    <div class="input-group">
        <input type="number" id="guessInput" placeholder="ใส่ตัวเลขที่ทายที่นี่" min="1" max="100" autocomplete="off">
    </div>

    <button id="btnGuess" onclick="checkGuess()">ทายคำตอบ!</button>
    <button id="btnReset" onclick="initGame()">เล่นใหม่อีกครั้ง</button>

    <div id="hintMsg" class="hint-message">เริ่มทายได้เลย!</div>
</div>

<script>
    let targetNumber = 0;
    let attempts = 0;
    let startTime = 0;
    let timerInterval = null;
    let isGameActive = false;

    const guessInput = document.getElementById('guessInput');
    const hintMsg = document.getElementById('hintMsg');
    const attemptVal = document.getElementById('attemptVal');
    const timeVal = document.getElementById('timeVal');
    const btnGuess = document.getElementById('btnGuess');
    const btnReset = document.getElementById('btnReset');

    // ฟังก์ชันเริ่มต้นเกมใหม่
    function initGame() {
        // สุ่มเลข 1 - 100
        targetNumber = Math.floor(Math.random() * 100) + 1;
        attempts = 0;
        isGameActive = true;
        
        // รีเซ็ต UI
        attemptVal.innerText = attempts;
        timeVal.innerText = "0.0";
        guessInput.value = "";
        guessInput.disabled = false;
        btnGuess.style.display = "block";
        btnReset.style.display = "none";
        hintMsg.innerText = "เริ่มทายได้เลย!";
        hintMsg.className = "hint-message";

        // เริ่มจับเวลา
        startTime = Date.now();
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            if (isGameActive) {
                let elapsed = (Date.now() - startTime) / 1000;
                timeVal.innerText = elapsed.toFixed(1);
            }
        }, 100);

        guessInput.focus();
    }

    // ฟังก์ชันตรวจคำตอบ
    function checkGuess() {
        if (!isGameActive) return;

        const userGuess = parseInt(guessInput.value);

        // ตรวจสอบความถูกต้องของ Input
        if (isNaN(userGuess) || userGuess < 1 || userGuess > 100) {
            hintMsg.innerText = "กรุณาใส่ตัวเลขระหว่าง 1 ถึง 100 เท่านั้น!";
            hintMsg.className = "hint-message too-low";
            return;
        }

        attempts++;
        attemptVal.innerText = attempts;

        if (userGuess === targetNumber) {
            // ทายถูก!
            isGameActive = false;
            clearInterval(timerInterval);
            let finalTime = ((Date.now() - startTime) / 1000).toFixed(2);
            
            hintMsg.innerText = `🎉 ถูกต้องแล้วคร้าบ! เลขคือ ${targetNumber} (ใช้ไป ${attempts} ครั้ง ในเวลา ${finalTime} วินาที)`;
            hintMsg.className = "hint-message success";
            
            endGame();
        } else if (userGuess > targetNumber) {
            // ทายมากเกินไป
            hintMsg.innerText = "📈 มากเกินไป! ลองเลขที่น้อยกว่านี้";
            hintMsg.className = "hint-message too-high";
        } else {
            // ทายน้อยเกินไป
            hintMsg.innerText = "📉 น้อยเกินไป! ลองเลขที่มากกว่านี้";
            hintMsg.className = "hint-message too-low";
        }

        guessInput.value = "";
        guessInput.focus();
    }

    function endGame() {
        guessInput.disabled = true;
        btnGuess.style.display = "none";
        btnReset.style.display = "block";
    }

    // รองรับการกดปุ่ม Enter ในช่อง Input
    guessInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            checkGuess();
        }
    });

    // เริ่มเกมทันทีที่เปิดหน้าเว็บ
    initGame();
</script>

</body>
</html>
